<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Sbírka</title>
    <meta name="description" content="Správa sbírky Magic: The Gathering karet" />
    <meta name="theme-color" content="#0d0d0f" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { background: #0d0d0f; color: #e8e0cc; font-family: 'Crimson Pro', Georgia, serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }
      select option { background: #1a1a20; color: #e8e0cc; }
      @keyframes cardReveal {
        from { opacity:0; transform:translate(calc(-50% + var(--ox,0px)), calc(-50% + var(--oy,0px))) scale(var(--os,0.05)); filter:blur(18px) brightness(2); }
        55%  { transform:translate(-50%,-50%) scale(1.04); opacity:1; filter:blur(0) brightness(1); }
        to   { transform:translate(-50%,-50%) scale(1);    opacity:1; filter:blur(0) brightness(1); }
      }
      @keyframes cardClose {
        from { opacity:1; transform:translate(-50%,-50%) scale(1); filter:blur(0); }
        to   { opacity:0; transform:translate(calc(-50% + var(--ox,0px)), calc(-50% + var(--oy,0px))) scale(var(--os,0.05)); filter:blur(12px) brightness(2.5); }
      }
      @keyframes ember {
        0%   { opacity:1; transform:translate(0,0) scale(1); }
        20%  { opacity:0.95; transform:translate(calc(var(--ex)*0.2 + var(--wx)*0.1),calc(var(--ey)*0.2)) scale(0.85); }
        55%  { opacity:0.6;  transform:translate(calc(var(--ex)*0.58 + var(--wx)*0.45),calc(var(--ey)*0.58)) scale(0.45); }
        85%  { opacity:0.2;  transform:translate(calc(var(--ex)*0.88 + var(--wx)*0.75),calc(var(--ey)*0.88)) scale(0.2); }
        100% { opacity:0;   transform:translate(calc(var(--ex) + var(--wx)),var(--ey)) scale(0); }
      }
      @keyframes emberDrift {
        0%   { opacity:0.85; transform:translate(0,0) scale(1); }
        30%  { opacity:0.65; transform:translate(calc(var(--dx)*0.3),calc(var(--dy)*0.3 + var(--wb)*0.4)) scale(0.65); }
        70%  { opacity:0.25; transform:translate(calc(var(--dx)*0.75),calc(var(--dy)*0.75 + var(--wb))) scale(0.28); }
        100% { opacity:0;   transform:translate(var(--dx),var(--dy)) scale(0); }
      }
      @keyframes cardClose {
        from { opacity:1; transform:translate(-50%,-50%) scale(1); filter:blur(0); }
        to   { opacity:0; transform:translate(calc(-50% + var(--ox,0px)), calc(-50% + var(--oy,0px))) scale(var(--os,0.05)); filter:blur(12px) brightness(2.5); }
      }
      @keyframes particle {
        0%   { opacity:1; transform:translate(0,0) scale(1); }
        100% { opacity:0; transform:translate(var(--px),var(--py)) scale(0); }
      }
      @keyframes shimmer {
        0%   { opacity:0; transform:translate(var(--sx),var(--sy)) scale(0.3); }
        40%  { opacity:0.9; }
        100% { opacity:0; transform:translate(var(--ex),var(--ey)) scale(0); }
      }
      @keyframes ambientPulse {
        0%,100% { opacity:0.6; transform:translate(-50%,-50%) scale(1); }
        50%     { opacity:1;   transform:translate(-50%,-50%) scale(1.03); }
      }
      @keyframes 
        from { opacity:0; transform:translate(calc(-50% + var(--ox,0px)), calc(-50% + var(--oy,0px))) scale(0.1); filter:blur(20px); }
        65%  { transform:translate(-50%,-50%) scale(1.05); opacity:1; filter:blur(0); }
        to   { transform:translate(-50%,-50%) scale(1);    opacity:1; filter:blur(0); }
      }
      @keyframes rarityPulse {
        0%,100% { opacity:0.55; transform:scale(1); }
        50%     { opacity:1;    transform:scale(1.02); }
      }
      @keyframes grainMove {
        0%{transform:translate(0,0)}   20%{transform:translate(1%,-1%)}
        40%{transform:translate(-1%,1%)} 60%{transform:translate(1%,1%)}
        80%{transform:translate(-1%,-1%)} 100%{transform:translate(0,0)}
      }
    </style>
